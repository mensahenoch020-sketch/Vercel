}

function parsePicks(rows) {
  var picks = [];
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var a = row.analysis || '';
    var matchM = a.match(/MATCH:\s*(.+)/i);
    var leagueM = a.match(/LEAGUE:\s*(.+)/i);
    var pickM = a.match(/OFFICIAL PICK:\s*(.+)/i);
    var oddsM = a.match(/LIVE ODDS:\s*(.+)/i);
    var edgeM = a.match(/Edge identified:\s*\+?([\d.]+)%/i);
    var confM = a.match(/probability:\s*([\d.]+)%/i);
    var tierM = a.match(/TIER\s*(\d)/i);
    var stakeM = a.match(/stake:\s*([\d.]+)%/i);
    if (matchM && pickM) {
      picks.push({
        match: matchM[1].trim(),
        league: leagueM ? leagueM[1].trim() : 'Global Markets',
        pick: pickM[1].trim(),
        odds: oddsM ? oddsM[1].trim() : '—',
        edge: edgeM ? parseFloat(edgeM[1]) : 5,
        confidence: confM ? Math.round(parseFloat(confM[1])) : 65,
        tier: tierM ? parseInt(tierM[1]) : 2,
        stake: stakeM ? parseFloat(stakeM[1]) : 2,
        date: row.created_at
      });
    }
  }
  return picks;
}

function getDemoPlaceholder() {
  return [{ match: 'Awaiting Data', league: 'AuraAI Analytics', pick: 'Pending', odds: '—', edge: 0, confidence: 0, tier: 2, stake: 0 }];
}

// ── MATCH BROWSER ──
function buildDateStrip() {
  var strip = document.getElementById('date-strip');
  strip.innerHTML = '';
  var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  for (var i = 0; i < 7; i++) {
    var d = new Date();
    d.setDate(d.getDate() + i);
    var str = d.toISOString().slice(0, 10);
    var chip = document.createElement('div');
    chip.className = 'date-chip' + (str === selectedDate ? ' active' : '');
    chip.innerHTML = '<div class="day">' + days[d.getDay()] + '</div><div class="num">' + d.getDate() + '</div>';
    (function(dateStr, chipEl) {
      chipEl.onclick = function() {
        selectedDate = dateStr;
        document.querySelectorAll('.date-chip').forEach(function(c) { c.classList.remove('active'); });
        chipEl.classList.add('active');
        renderMatches(dateStr);
      };
    })(str, chip);
    strip.appendChild(chip);
  }
}

async function loadBrowser() {
  buildDateStrip();
  renderMatches(selectedDate);
}

async function renderMatches(date) {
  var container = document.getElementById('browser-matches');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Fetching fixtures...</div>';

  if (allMatches[date]) {
    displayMatches(allMatches[date], container);
    return;
  }

  var data = await supaFetch('fixtures_cache?cache_key=eq.' + date + '&limit=1');
  if (data && data.length > 0) {
    try {
      var matches = JSON.parse(data[0].matches || '[]');
      allMatches[date] = matches;
      displayMatches(matches, container);
      return;
    } catch(e) { console.error('Parse error', e); }
  }

  container.innerHTML = '<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">No cached fixtures. Ask the bot "give me matches for ' + formatDate(date) + '"</div></div>';
}

function displayMatches(matches, container) {
  if (!matches || matches.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No matches found for this date</div></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var inAccu = accumulator.some(function(a) { return a.match === m.match; });
    var safeMatch = (m.match || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    var safeLeague = (m.league || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html += '<div class="match-row"><div style="flex:1"><div class="match-teams">' + m.match + '</div><div class="match-meta">' + m.league + ' &bull; ' + m.date + '</div></div><div class="match-add-btn' + (inAccu ? ' added' : '') + '" onclick="toggleAccu(\'' + safeMatch + '\',\'' + safeLeague + '\')">' + (inAccu ? '✓' : '+') + '</div></div>';
  }
  container.innerHTML = html;
}

function toggleAccu(match, league) {
  var existing = accumulator.findIndex(function(a) { return a.match === match; });
  if (existing >= 0) {
    accumulator.splice(existing, 1);
    showToast('Removed from builder');
  } else {
    accumulator.push({ match: match, league: league });
    showToast('Added to builder ✓');
  }
  renderMatches(selectedDate);
  if (document.getElementById('view-accumulator').classList.contains('active')) renderAccumulator();
}

// ── HISTORY — clickable modal ──
async function loadHistory() {
  var container = document.getElementById('history-list');
  if (!userId) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔒</div><div class="empty-text">Open via Telegram to view history</div></div>';
    return;
  }

  var data = await supaFetch('picks?user_id=eq.' + userId + '&order=created_at.desc&limit=30');
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">No prediction history yet.</div></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < data.length; i++) {
    var row = data[i];
    var dateStr = new Date(row.created_at).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
    var query = (row.user_input || 'Pick Request').replace(/"/g, '&quot;');
    var analysis = (row.analysis || '').replace(/"/g, '&quot;').replace(/\n/g, '\\n');
    html += '<div class="history-card" onclick="openModal(\'' + dateStr + '\', \'' + query + '\', \'' + analysis + '\')">';
    html += '<div class="history-card-header">';
    html += '<div class="history-card-header-left">';
    html += '<div class="history-date">' + dateStr + '</div>';
    html += '<div class="history-query">"' + (row.user_input || 'Pick Request') + '"</div>';
    html += '</div>';
    html += '<div class="history-toggle">▼</div>';
    html += '</div>';
    html += '<div style="padding: 0 16px 12px; font-size:12px; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">' + (row.analysis || '').slice(0, 120) + '...</div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function openModal(dateStr, query, analysis) {
  document.getElementById('modal-date').textContent = dateStr;
  document.getElementById('modal-query').textContent = '"' + query + '"';
  document.getElementById('modal-analysis').textContent = analysis.replace(/\\n/g, '\n');
  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    closeModalDirect();
  }
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ── ACCUMULATOR ──
function renderAccumulator() {
  var legsEl = document.getElementById('accu-legs');
  var summEl = document.getElementById('accu-summary-wrap');

  if (accumulator.length === 0) {
    legsEl.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">Browse matches and tap + to start building your accumulator</div></div>';
    summEl.innerHTML = '';
    return;
  }

  var html = '';
  for (var i = 0; i < accumulator.length; i++) {
    var leg = accumulator[i];
    html += '<div class="accu-leg">';
    html += '<div style="flex:1"><div style="font-weight:600;font-size:15px;">' + leg.match + '</div>';
    html += '<div style="font-size:12px;color:var(--gold);margin-top:4px;">' + leg.league + '</div></div>';
    html += '<div style="width:32px;height:32px;border-radius:8px;background:rgba(255,76,76,0.1);border:1px solid rgba(255,76,76,0.2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" onclick="removeAccuLeg(' + i + ')">✕</div>';
    html += '</div>';
  }
  legsEl.innerHTML = html;

  summEl.innerHTML = '<div class="accu-summary"><div class="accu-summary-row"><span>Selections</span><span>' + accumulator.length + '</span></div><div class="accu-summary-row"><span>Analysis Status</span><span>Ready to send</span></div></div><button class="accu-btn" onclick="sendAccuToBot()">ANALYSE IN BOT ⚡</button>';
}

function removeAccuLeg(i) {
  accumulator.splice(i, 1);
  renderAccumulator();
  showToast('Selection removed');
}

function sendAccuToBot() {
  if (accumulator.length === 0) {
    showToast('Add matches first');
    return;
  }
  var matches = accumulator.map(function(a) { return a.match; }).join(', ');
  var msg = 'Build me an accumulator with these matches: ' + matches;

  if (tg) {
    // Close the web app and open bot chat with the message
    tg.close();
    // Use switchInlineQuery to pre-fill the message
    setTimeout(function() {
      if (tg.openTelegramLink) {
        tg.openTelegramLink('https://t.me/' + botUsername + '?start=accu');
      }
    }, 300);
    // Store in localStorage so bot knows what was selected
    try { localStorage.setItem('pendingAccu', msg); } catch(e) {}
  } else {
    // Desktop fallback — copy to clipboard
    if (navigator.clipboard) {
      navigator.clipboard.writeText(msg).then(function() {
        showToast('Copied! Paste in bot chat');
      });
    } else {
      showToast('Open in Telegram to send');
    }
  }
}

document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
