/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed; top:0; left:0; height:2px; width:0%;
  background: var(--gold-gradient); z-index:9999;
  transition: width 0.3s ease, opacity 0.4s ease;
}

/* ── PULL TO REFRESH ── */
#ptr-indicator {
  display:flex; align-items:center; justify-content:center;
  gap:8px; height:0; overflow:hidden;
  font-size:13px; color:var(--muted);
  transition: height 0.2s ease;
}
#ptr-indicator.pulling { height:48px; }
#ptr-indicator.refreshing { height:48px; }
.ptr-spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; }
#ptr-indicator.refreshing .ptr-spinner { animation:spin 0.8s linear infinite; }

.header {
  position: sticky; top:0; z-index:100;
  background: rgba(5,7,10,0.85);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items:center; justify-content:space-between;
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-mark {
  width:36px; height:36px; background: var(--gold-gradient);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif; font-size:20px; color:#000;
}
.logo-text {
  font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1.5px;
  background: var(--gold-gradient);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.live-badge {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-weight:600; color:var(--green);
  background:var(--green-dim); border:1px solid rgba(0,250,154,0.2);
  padding:6px 12px; border-radius:20px; font-family:'DM Mono',monospace;
}
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.nav {
  display:flex; gap:8px; padding:14px 20px;
  background:var(--surface); border-bottom:1px solid var(--border);
  overflow-x:auto; scrollbar-width:none;
}
.nav::-webkit-scrollbar { display:none; }
.nav-btn {
  flex-shrink:0; padding:10px 18px; border-radius:12px;
  border:1px solid transparent; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
  color:var(--muted); background:rgba(255,255,255,0.03);
  transition:var(--transition); white-space:nowrap;
}
.nav-btn.active { background:var(--gold-glow); color:var(--gold); border:1px solid rgba(226,194,117,0.25); }
.view { display:none; padding:20px; animation:slideUp 0.35s ease; }
.view.active { display:block; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.section-label {
  font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px;
  color:var(--muted); margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.section-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px 12px; text-align:center; }
.stat-value { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); line-height:1; }
.stat-label { font-size:10px; color:var(--muted); font-weight:600; letter-spacing:0.5px; margin-top:6px; text-transform:uppercase; }

/* ── FILTER ROW ── */
.filter-row {
  display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
  padding-bottom:4px; margin-bottom:16px;
}
.filter-row::-webkit-scrollbar { display:none; }
.filter-chip {
  flex-shrink:0; padding:7px 14px; border-radius:20px;
  border:1px solid var(--border); background:var(--card);
  color:var(--muted); font-size:12px; font-weight:500; cursor:pointer;
  transition:var(--transition); white-space:nowrap;
}
.filter-chip.active { background:var(--gold-glow); border-color:var(--gold); color:var(--gold); }

/* ── SEARCH BAR ── */
.search-wrap {
  position:relative; margin-bottom:16px;
}
.search-input {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:12px 16px 12px 40px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
  outline:none; transition:border-color 0.2s;
}
.search-input:focus { border-color:rgba(226,194,117,0.4); }
.search-input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; pointer-events:none; }

/* ── PICK CARD ── */
.pick-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; margin-bottom:16px; position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  overflow:hidden;
}
.pick-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
.pick-card.tier1::before { background:var(--gold-gradient); }
.pick-card.tier2::before { background:#4fc3f7; }
.pick-card.tier3::before { background:var(--muted); }
.pick-header {
  padding:16px 20px 12px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:flex-start;
  cursor:pointer;
}
.pick-match { font-weight:600; font-size:16px; line-height:1.3; }
.pick-league { font-size:12px; color:var(--muted); margin-top:4px; }
.pick-header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; margin-left:12px; }
.tier-badge { font-family:'DM Mono',monospace; font-size:10px; font-weight:500; padding:4px 10px; border-radius:20px; white-space:nowrap; }
.tier1 .tier-badge { background:var(--gold-glow); color:var(--gold); border:1px solid rgba(226,194,117,0.3); }
.tier2 .tier-badge { background:rgba(79,195,247,0.1); color:#4fc3f7; border:1px solid rgba(79,195,247,0.2); }
.tier3 .tier-badge { background:rgba(139,148,158,0.1); color:var(--muted); border:1px solid var(--border); }
.collapse-arrow { color:var(--muted); font-size:12px; transition:transform 0.3s ease; }
.pick-card.collapsed .collapse-arrow { transform:rotate(-90deg); }
.pick-body { padding:16px 20px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.pick-card.collapsed .pick-body { display:none; }
.pick-card.collapsed .confidence-wrap { display:none; }
.pick-field-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; font-weight:500; }
.pick-field-value { font-size:15px; font-weight:600; margin-top:4px; }
.pick-field-value.gold { color:var(--gold); }
.pick-field-value.green { color:var(--green); }
.confidence-wrap { padding:0 20px 20px; }
.confidence-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
.confidence-track { height:6px; background:var(--accent); border-radius:3px; overflow:hidden; }
.confidence-fill { height:100%; border-radius:3px; background:var(--gold-gradient); transition:width 1.2s ease; }

/* ── DATE STRIP ── */
.date-strip { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; margin-bottom:20px; }
.date-strip::-webkit-scrollbar { display:none; }
.date-chip {
  flex-shrink:0; padding:10px 14px; border-radius:12px;
  border:1px solid var(--border); background:var(--card);
  color:var(--muted); font-size:12px; font-weight:500; cursor:pointer;
  transition:var(--transition); text-align:center; min-width:60px;
  position:relative;
}
.date-chip.active { background:var(--gold-glow); border-color:var(--gold); color:var(--gold); }
.date-chip .day { font-size:11px; margin-bottom:2px; text-transform:uppercase; }
.date-chip .num { font-family:'Bebas Neue',sans-serif; font-size:24px; line-height:1; }
.date-chip .count-badge {
  position:absolute; top:-6px; right:-6px;
  background:var(--gold-gradient); color:#000;
  font-size:9px; font-weight:700; padding:2px 5px;
  border-radius:10px; min-width:16px; text-align:center;
}

/* ── MATCH ROW ── */
.match-row {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:16px; margin-bottom:10px;
  display:flex; align-items:center; gap:12px; transition:var(--transition);
}
.match-row:active { background:var(--accent); }
.match-teams { font-weight:600; font-size:15px; }
.match-meta { font-size:12px; color:var(--muted); margin-top:4px; }
.match-add-btn {
  width:36px; height:36px; border-radius:10px; flex-shrink:0;
  background:rgba(255,255,255,0.03); border:1px solid var(--border);
  color:var(--text); font-size:20px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:var(--transition);
}
.match-add-btn.added { background:var(--green-dim); border-color:rgba(0,250,154,0.3); color:var(--green); }

/* ── HISTORY ── */
.history-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; margin-bottom:10px; cursor:pointer;
  transition:var(--transition); overflow:hidden;
}
.history-card:active { background:var(--accent); }
.history-header { padding:16px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.history-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:6px; }
.history-query { font-weight:600; font-size:14px; color:var(--gold); line-height:1.4; }
.history-arrow { flex-shrink:0; width:28px; height:28px; border-radius:8px; background:var(--gold-glow); border:1px solid rgba(226,194,117,0.2); color:var(--gold); font-size:12px; display:flex; align-items:center; justify-content:center; transition:transform 0.3s ease; }
.history-card.open .history-arrow { transform:rotate(180deg); }
.history-preview { padding:0 16px 12px; font-size:12px; color:var(--muted); line-height:1.5; }
.history-full { display:none; padding:0 16px 16px; border-top:1px solid var(--border); }
.history-card.open .history-full { display:block; }
.history-full-text { padding-top:14px; font-size:13px; color:var(--text); line-height:1.8; white-space:pre-wrap; word-break:break-word; }

/* ── ACCUMULATOR ── */
.accu-leg {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:16px; margin-bottom:10px;
  display:flex; align-items:center; gap:12px;
}
.accu-summary { background:linear-gradient(135deg,var(--card),var(--accent)); border:1px solid rgba(226,194,117,0.2); border-radius:16px; padding:20px; margin-top:16px; }
.accu-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
.accu-row:last-child { border-bottom:none; }
.accu-row span:last-child { font-weight:600; color:var(--gold); }
.accu-btn {
  width:100%; margin-top:16px; padding:16px;
  background:var(--gold-gradient); border:none; border-radius:14px;
  font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px;
  color:#000; cursor:pointer; box-shadow:0 4px 16px rgba(226,194,117,0.3);

.accu-btn:active { opacity:0.85; transform:scale(0.98); }
.accu-btn:disabled { opacity:0.5; cursor:not-allowed; }
.accu-btn-secondary {
  width:100%; margin-top:10px; padding:14px;
  background:transparent; border:1px solid var(--gold);
  border-radius:14px; font-family:'Bebas Neue',sans-serif;
  font-size:18px; letter-spacing:2px; color:var(--gold); cursor:pointer;
}
.accu-btn-secondary:active { background:var(--gold-glow); }

/* ── PAYOUT CALCULATOR ── */
.payout-wrap {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:16px; margin-top:12px;

.payout-title { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }

/* ── ANALYSIS PANEL ── */
.analysis-panel {

.analysis-panel-title { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px; color:var(--gold); margin-bottom:12px; }
.analysis-text { font-size:13px; color:var(--text); line-height:1.8; white-space:pre-wrap; word-break:break-word; }

/* ── LOADING ── */
.loading { display:flex; align-items:center; justify-content:center; padding:60px 20px; gap:12px; color:var(--muted); font-size:14px; }
.spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }

.empty-text { font-size:15px; font-weight:500; max-width:250px; margin:0 auto; line-height:1.5; }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, var(--accent) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-card { height:120px; border-radius:16px; margin-bottom:16px; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(100px);

  font-size:14px; font-weight:500; color:var(--text);
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index:999; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }

.no-results { text-align:center; padding:30px 20px; color:var(--muted); font-size:14px; }

        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' }
      });
    } catch(e) {}
  }

  // ── TOAST ──
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── NAV ──
  function switchView(name, btn) {
    haptic('light');
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('view-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'browser')     loadBrowser();
    if (name === 'history')     loadHistory();
    if (name === 'accumulator') renderAccumulator();
    if (name === 'dashboard')   loadDashboard();
  }

  // ── CONFIDENCE BAR ──
  function confBar(pct) {
    var w = Math.min(Math.max(parseInt(pct) || 0, 0), 100);
    return '<div class="confidence-wrap">'
      + '<div class="confidence-label"><span>AuraAI Confidence</span>'
      + '<span style="color:var(--gold)">' + w + '%</span></div>'
      + '<div class="confidence-track">'
      + '<div class="confidence-fill" style="width:' + w + '%"></div>'
      + '</div></div>';
  }

  function pickCardHTML(p, idx) {
    var tc = p.edge >= 10 ? 'tier1' : p.edge >= 5 ? 'tier2' : 'tier3';
    var tl = p.edge >= 10 ? 'SHARP VALUE' : p.edge >= 5 ? 'MODERATE' : 'SPECULATIVE';
    return '<div class="pick-card ' + tc + '" id="pcard-' + idx + '">'
      + '<div class="pick-header" onclick="togglePick(' + idx + ')">'
      + '<div><div class="pick-match">' + escHtml(p.match) + '</div>'
      + '<div class="pick-league">' + escHtml(p.league) + '</div></div>'
      + '<div class="pick-header-right">'
      + '<div class="tier-badge">' + tl + '</div>'
      + '<span class="collapse-arrow">▼</span>'
      + '</div></div>'
      + '<div class="pick-body">'
      + '<div class="pick-field"><div class="pick-field-label">Official Pick</div>'
      + '<div class="pick-field-value gold">' + escHtml(p.pick) + '</div></div>'
      + '<div class="pick-field"><div class="pick-field-label">Live Odds</div>'
      + '<div class="pick-field-value">' + escHtml(p.odds) + '</div></div>'
      + '<div class="pick-field"><div class="pick-field-label">Edge</div>'
      + '<div class="pick-field-value green">+' + p.edge + '%</div></div>'
      + '<div class="pick-field"><div class="pick-field-label">Stake</div>'
      + '<div class="pick-field-value">' + p.stake + '% Bankroll</div></div>'
      + '</div>'
      + confBar(p.confidence)
      + '</div>';
  }

  function togglePick(idx) {
    haptic('light');
    var card = document.getElementById('pcard-' + idx);
    if (card) card.classList.toggle('collapsed');
  }

  // ── DASHBOARD ──
  async function loadDashboard() {
    showProgress();
    var el = document.getElementById('dashboard-picks');
    el.innerHTML = '<div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div>';

    if (userId) {
      var cutoff = new Date(Date.now() - 6 * 60 * 60 * 1000).toISOString();
      supaDelete('picks?user_id=eq.' + userId + '&created_at=lt.' + cutoff);
    }

    var picks = [];
    if (userId) {
      var today = getToday();
      var data  = await supaFetch('picks?user_id=eq.' + userId + '&created_at=gte.' + today + 'T00:00:00&order=created_at.desc&limit=30');
      if (data && data.length) picks = parsePicks(data);
    }

    allPicks = picks;
    renderLeagueFilter(picks);

    var sharp   = picks.filter(function(p) { return p.edge >= 10; }).length;
    var avgEdge = picks.length ? (picks.reduce(function(s,p) { return s + p.edge; }, 0) / picks.length).toFixed(1) : '—';
    document.getElementById('stat-picks').textContent = picks.length || '—';
    document.getElementById('stat-sharp').textContent = picks.length ? sharp : '—';
    document.getElementById('stat-edge').textContent  = picks.length ? avgEdge + '%' : '—';

    renderPicks(picks);
    hideProgress();
  }

  function renderLeagueFilter(picks) {
    var leagues = ['All'];
    picks.forEach(function(p) { if (p.league && leagues.indexOf(p.league) === -1) leagues.push(p.league); });
    var el = document.getElementById('league-filter');
    el.innerHTML = leagues.map(function(l) {
      return '<div class="filter-chip' + (l === activeLeague ? ' active' : '') + '" onclick="setLeagueFilter(\'' + escHtml(l) + '\')">' + escHtml(l) + '</div>';
    }).join('');
  }

  function setLeagueFilter(league) {
    haptic('light');
    activeLeague = league;
    renderLeagueFilter(allPicks);
    var filtered = league === 'All' ? allPicks : allPicks.filter(function(p) { return p.league === league; });
    renderPicks(filtered);
  }

  function renderPicks(picks) {
    var el = document.getElementById('dashboard-picks');
    if (!picks.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">⚽</div><div class="empty-text">Ask the bot for predictions and they\'ll appear here automatically</div></div>';
      return;
    }
    var seen = {}, unique = [];
    picks.forEach(function(p) { var k = p.match + '|' + p.pick; if (!seen[k]) { seen[k]=true; unique.push(p); } });
    el.innerHTML = unique.map(pickCardHTML).join('');
  }

  function parsePicks(rows) {
    var out = [];
    rows.forEach(function(row) {
      var a  = row.analysis || '';
      var mM = a.match(/⚽\s*(.+?)\s*\n/) || a.match(/MATCH:\s*(.+)/i);
      var lM = a.match(/🏆\s*(.+?)\s*\|/) || a.match(/LEAGUE:\s*(.+)/i);
      var pM = a.match(/✅\s*PICK:\s*(.+)/i);
      var oM = a.match(/💰\s*ODDS:\s*([\d.]+)/i);
      var eM = a.match(/Edge identified:\s*\+?([\d.]+)%/i);
      var cM = a.match(/calculated probability:\s*([\d.]+)%/i);
      var sM = a.match(/Recommended stake:\s*([\d.]+)%/i);
      var matchName = (mM ? mM[1].trim() : null) || row.user_input || 'Unknown Match';
      if (pM || mM) {
        out.push({
          match:      matchName,
          league:     lM ? lM[1].trim() : 'Global Markets',
          pick:       pM ? pM[1].trim() : '—',
          odds:       oM ? oM[1] : '—',
          edge:       eM ? parseFloat(eM[1]) : 5,
          confidence: cM ? Math.round(parseFloat(cM[1])) : 65,
          stake:      sM ? parseFloat(sM[1]) : 2,
        });
      }
    });
    return out;
  }

  // ── MATCH BROWSER ──
  function buildDateStrip() {
    var strip = document.getElementById('date-strip');
    strip.innerHTML = '';
    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    for (var i = 0; i < 7; i++) {
      var d   = new Date(); d.setDate(d.getDate() + i);
      var str = d.toISOString().slice(0, 10);
      var chip = document.createElement('div');
      chip.className = 'date-chip' + (str === selectedDate ? ' active' : '');
      var count = (matchCache[str] || allFixtures[str] || []).length;
      chip.innerHTML = '<div class="day">' + days[d.getDay()] + '</div>'
        + '<div class="num">' + d.getDate() + '</div>'
        + (count ? '<div class="count-badge">' + count + '</div>' : '');
      (function(ds, ce) {
        ce.onclick = function() {
          haptic('light');
          selectedDate = ds;
          document.querySelectorAll('.date-chip').forEach(function(c) { c.classList.remove('active'); });
          ce.classList.add('active');
          renderMatchesForDate(ds);
        };
      })(str, chip);
      strip.appendChild(chip);
    }
  }

  async function loadBrowser() {
    showProgress();
    buildDateStrip();
    await fetchAllFixtures();
    buildDateStrip(); // rebuild with counts
    buildMatchLeagueFilter();
    renderMatchesForDate(selectedDate);
    hideProgress();
  }

  async function fetchAllFixtures() {
    try {
      var r = await fetch(BOT_URL + '/fixtures/range', { signal: AbortSignal.timeout(12000) });
      if (r.ok) {
        var data = await r.json();
        if (data.by_date) {
          allFixtures = data.by_date;
          Object.keys(data.by_date).forEach(function(date) { matchCache[date] = data.by_date[date]; });
          return;
        }
      }
    } catch(e) {}
    try {
      var r2 = await fetch(BOT_URL + '/fixtures', { signal: AbortSignal.timeout(8000) });
      if (r2.ok) {
        var d2 = await r2.json();
        if (d2.fixtures && d2.fixtures.length) {
          var today = getToday();
          matchCache[today] = d2.fixtures;
          allFixtures[today] = d2.fixtures;
          return;
        }
      }
    } catch(e) {}
    var today  = getToday();
    var cached = await supaFetch('fixtures_cache?cache_key=eq.' + today + '&limit=1');
    if (cached && cached.length) {
      try { var m = JSON.parse(cached[0].matches || '[]'); matchCache[today] = m; allFixtures[today] = m; } catch(e) {}
    }
  }

  function buildMatchLeagueFilter() {
    var leagues = ['All'];
    Object.values(allFixtures).forEach(function(matches) {
      matches.forEach(function(m) { if (m.league && leagues.indexOf(m.league) === -1) leagues.push(m.league); });
    });
    var el = document.getElementById('match-league-filter');
    el.innerHTML = leagues.slice(0, 8).map(function(l) {
      return '<div class="filter-chip' + (l === activeMatchLeague ? ' active' : '') + '" onclick="setMatchLeague(\'' + escHtml(l) + '\')">' + escHtml(l) + '</div>';
    }).join('');
  }

  function setMatchLeague(league) {
    haptic('light');
    activeMatchLeague = league;
    buildMatchLeagueFilter();
    renderMatchesForDate(selectedDate);
  }

  function filterMatches() {
    renderMatchesForDate(selectedDate);
  }

  function renderMatchesForDate(date) {
    var el      = document.getElementById('browser-matches');
    var matches = matchCache[date] || allFixtures[date] || [];
    var search  = (document.getElementById('match-search').value || '').toLowerCase();

    // Apply league filter
    if (activeMatchLeague !== 'All') {
      matches = matches.filter(function(m) { return m.league === activeMatchLeague; });
    }
    // Apply search filter
    if (search) {
      matches = matches.filter(function(m) {
        return m.match.toLowerCase().indexOf(search) !== -1
          || (m.league || '').toLowerCase().indexOf(search) !== -1;
      });
    }

    if (!matches.length) {
      el.innerHTML = search
        ? '<div class="no-results">No matches found for "' + escHtml(search) + '"</div>'
        : '<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No fixtures for this date. Try refreshing or another day.</div></div>';
      return;
    }

    var html = '';
    matches.forEach(function(m, i) {
      var inA = accumulator.some(function(a) { return a.match === m.match; });
      html += '<div class="match-row">'
        + '<div style="flex:1">'
        + '<div class="match-teams">' + escHtml(m.match) + '</div>'
        + '<div class="match-meta">' + escHtml(m.league) + ' &bull; 🕐 ' + escHtml(m.date) + '</div>'
        + '</div>'
        + '<div class="match-add-btn' + (inA ? ' added' : '') + '" onclick="toggleAccuMatch(\'' + date + '\',' + i + ')">'
        + (inA ? '✓' : '+') + '</div></div>';
    });
    el.innerHTML = html;
  }

  function toggleAccuMatch(date, idx) {
    haptic('medium');
    var allMatches = matchCache[date] || allFixtures[date] || [];
    var search  = (document.getElementById('match-search').value || '').toLowerCase();
    var league  = activeMatchLeague;
    var filtered = allMatches;
    if (league !== 'All') filtered = filtered.filter(function(m) { return m.league === league; });
    if (search)           filtered = filtered.filter(function(m) { return m.match.toLowerCase().indexOf(search) !== -1 || (m.league||'').toLowerCase().indexOf(search) !== -1; });
    var m = filtered[idx];
    if (!m) return;
    var existing = accumulator.findIndex(function(a) { return a.match === m.match; });
    if (existing >= 0) { accumulator.splice(existing, 1); showToast('Removed from builder'); }
    else { accumulator.push({ match:m.match, league:m.league, date:m.date, odds:m.odds || '—' }); showToast('Added ✓'); haptic('success'); }
    renderMatchesForDate(date);
    if (document.getElementById('view-accumulator').classList.contains('active')) renderAccumulator();
  }

  // ── HISTORY ──
  async function loadHistory() {
    showProgress();
    var el = document.getElementById('history-list');
    if (!userId) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🔒</div><div class="empty-text">Open via Telegram to view your history</div></div>';
      hideProgress();
      return;
    }
    var cutoff = new Date(Date.now() - 6 * 60 * 60 * 1000).toISOString();
    await supaDelete('picks?user_id=eq.' + userId + '&created_at=lt.' + cutoff);
    var data = await supaFetch('picks?user_id=eq.' + userId + '&order=created_at.desc&limit=50');
    if (!data || !data.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">No prediction history yet. Ask the bot for some picks!</div></div>';
      hideProgress();
      return;
    }
    historyRows = data;
    renderHistoryList(data);
    hideProgress();
  }

  function filterHistory() {
    var search = (document.getElementById('history-search').value || '').toLowerCase();
    if (!search) { renderHistoryList(historyRows); return; }
    var filtered = historyRows.filter(function(row) {
      return (row.user_input || '').toLowerCase().indexOf(search) !== -1
        || (row.analysis || '').toLowerCase().indexOf(search) !== -1;
    });
    renderHistoryList(filtered);
    if (!filtered.length) {
      document.getElementById('history-list').innerHTML = '<div class="no-results">No results for "' + escHtml(search) + '"</div>';
    }
  }

  function renderHistoryList(rows) {
    var el = document.getElementById('history-list');
    if (!rows.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">No history found.</div></div>'; return; }
    var html = '';
    rows.forEach(function(row, i) {
      var dateStr   = new Date(row.created_at).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      var matchName = escHtml(row.user_input || 'Prediction');
      var preview   = escHtml((row.analysis || '').replace(/[🔥⚽🏆📅✅💰📊📈💎━]/g,'').slice(0, 80)) + '...';
      html += '<div class="history-card" id="hcard-' + i + '" onclick="toggleHistory(' + i + ')">'
        + '<div class="history-header"><div>'
        + '<div class="history-date">' + dateStr + '</div>'
        + '<div class="history-query">' + matchName + '</div>'
        + '</div><div class="history-arrow">▼</div></div>'
        + '<div class="history-preview" id="hprev-' + i + '">' + preview + '</div>'
        + '<div class="history-full" id="hfull-' + i + '"><div class="history-full-text" id="htext-' + i + '"></div></div>'
        + '</div>';
    });
    el.innerHTML = html;
  }

  function toggleHistory(i) {
    haptic('light');
    var card   = document.getElementById('hcard-' + i);
    var text   = document.getElementById('htext-' + i);
    var prev   = document.getElementById('hprev-' + i);
    var isOpen = card.classList.contains('open');
    document.querySelectorAll('.history-card').forEach(function(c) { c.classList.remove('open'); });
    document.querySelectorAll('[id^="hprev-"]').forEach(function(p) { p.style.display = ''; });
    if (!isOpen) {
      card.classList.add('open');
      prev.style.display = 'none';
      if (!text.textContent && historyRows[i]) text.textContent = historyRows[i].analysis || 'No analysis saved.';
    }
  }

  // ── ACCUMULATOR ──
  function renderAccumulator() {
    var legsEl   = document.getElementById('accu-legs');
    var summEl   = document.getElementById('accu-summary-wrap');
    var resultEl = document.getElementById('accu-result');
    resultEl.innerHTML = '';

    if (!accumulator.length) {
      legsEl.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">Go to Matches tab and tap + to add matches here</div></div>';
      summEl.innerHTML = '';
      return;
    }

    var html = '';
    accumulator.forEach(function(leg, i) {
      html += '<div class="accu-leg">'
        + '<div style="flex:1">'
        + '<div style="font-weight:600;font-size:15px;">' + escHtml(leg.match) + '</div>'
        + '<div style="font-size:12px;color:var(--gold);margin-top:4px;">' + escHtml(leg.league) + '</div>'
        + '</div>'
        + '<div style="width:32px;height:32px;border-radius:8px;background:rgba(255,76,76,0.1);border:1px solid rgba(255,76,76,0.2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" onclick="removeAccuLeg(' + i + ')">✕</div>'
        + '</div>';
    });
    legsEl.innerHTML = html;

    // Payout calculator
    var payoutHtml = '<div class="payout-wrap">'
      + '<div class="payout-title">💰 Payout Calculator</div>'
      + '<div class="payout-input-row">'
      + '<input class="payout-input" id="stake-input" type="number" placeholder="Enter stake..." oninput="calcPayout()" />'
      + '<span style="color:var(--muted);font-size:13px;flex-shrink:0;">× odds</span>'
      + '</div>'
      + '<div class="payout-result" id="payout-result"></div>'
      + '</div>';

    summEl.innerHTML = '<div class="accu-summary">'
      + '<div class="accu-row"><span>Selections</span><span>' + accumulator.length + '</span></div>'
      + '<div class="accu-row"><span>Status</span><span style="color:var(--green)">Ready to analyse</span></div>'
      + '</div>'
      + payoutHtml
      + '<button class="accu-btn" id="accu-btn" onclick="analyseAccumulator()">ANALYSE NOW ⚡</button>'
      + '<button class="accu-btn-secondary" onclick="shareAccumulator()">📤 SHARE PICKS</button>';
  }

  function calcPayout() {
    var stake = parseFloat(document.getElementById('stake-input').value) || 0;
    var el    = document.getElementById('payout-result');
    if (!stake) { el.innerHTML = ''; return; }
    // Use 1.80 as default odds per leg if no analysis done yet
    var totalOdds = Math.pow(1.80, accumulator.length);
    var payout    = (stake * totalOdds).toFixed(2);
    var profit    = (stake * totalOdds - stake).toFixed(2);
    el.innerHTML  = '<div class="payout-amount">$' + payout + '</div>'
      + '<div class="payout-label">Potential payout &bull; Profit: $' + profit + '</div>';
  }

  function shareAccumulator() {
    haptic('medium');
    if (!accumulator.length) { showToast('Add matches first'); return; }
    var text = '🎯 AURA ACCUMULATOR PICKS\n━━━━━━━━━━━━━━━━━━━━\n';
    accumulator.forEach(function(leg, i) {
      text += (i + 1) + '. ' + leg.match + ' (' + leg.league + ')\n';
    });
    text += '━━━━━━━━━━━━━━━━━━━━\n⚡ Powered by AuraAI Quant';
    if (tg && tg.switchInlineQuery) {
      tg.switchInlineQuery(text);
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { showToast('Copied to clipboard ✓'); haptic('success'); });
    } else {
      showToast('Copy: ' + text.slice(0, 40) + '...');
    }
  }

  function removeAccuLeg(i) {
    haptic('light');
    accumulator.splice(i, 1);
    renderAccumulator();
    showToast('Removed');
  }

  async function analyseAccumulator() {
    if (!accumulator.length) { showToast('Add matches first'); return; }
    haptic('medium');
    var btn      = document.getElementById('accu-btn');
    var resultEl = document.getElementById('accu-result');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-sm"></span>ANALYSING...';
    resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>AuraAI calculating edge...</div>';

    var matchList = accumulator.map(function(a) { return { match:a.match, league:a.league, date:a.date||'', odds:a.odds||'—' }; });
    var userInput = 'Accumulator: ' + accumulator.map(function(a) { return a.match; }).join(', ');

    try {
      showProgress();
      var res = await fetch(BOT_URL + '/analyse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matches:matchList, user_input:userInput }),
        signal: AbortSignal.timeout(30000)
      });
      hideProgress();
      if (!res.ok) throw new Error('Server error ' + res.status);
      var data = await res.json();
      if (data.error) throw new Error(data.error);

      resultEl.innerHTML = '<div class="analysis-panel">'
        + '<div class="analysis-panel-title">🎯 AURAAI ACCUMULATOR ANALYSIS</div>'
        + '<div class="analysis-text" id="accu-output"></div></div>';
      document.getElementById('accu-output').textContent = data.analysis || 'No analysis returned.';

      // Update payout calculator with real combined odds
      if (data.combined_odds) {
        var stake = parseFloat((document.getElementById('stake-input') || {}).value) || 0;
        if (stake) {
          var payout = (stake * data.combined_odds).toFixed(2);
          var el = document.getElementById('payout-result');
          if (el) el.innerHTML = '<div class="payout-amount">$' + payout + '</div>'
            + '<div class="payout-label">Potential payout (real odds: ' + data.combined_odds + 'x)</div>';
        }
      }

      btn.disabled = false;
      btn.innerHTML = 'ANALYSE AGAIN ⚡';
      haptic('success');
      resultEl.scrollIntoView({ behavior:'smooth', block:'start' });
    } catch(err) {
      hideProgress();
      resultEl.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">' + escHtml(err.message) + '</div></div>';
      btn.disabled = false;
      btn.innerHTML = 'RETRY ⚡';
      haptic('error');
    }
  }

  // ── PULL TO REFRESH ──
  (function() {
    var startY    = 0;
    var pulling   = false;
    var threshold = 80;
    var indicator = document.getElementById('ptr-indicator');
    var ptrText   = document.getElementById('ptr-text');

    document.addEventListener('touchstart', function(e) {
      if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (!pulling) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 10) {
        indicator.classList.add('pulling');
        ptrText.textContent = dy > threshold ? 'Release to refresh' : 'Pull to refresh';
      }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (!pulling) return;
      var dy = e.changedTouches[0].clientY - startY;
      pulling = false;
      if (dy > threshold) {
        indicator.classList.remove('pulling');
        indicator.classList.add('refreshing');
        ptrText.textContent = 'Refreshing...';
        haptic('medium');
        var active = document.querySelector('.view.active');
        var id     = active ? active.id : '';
        var done   = function() { indicator.classList.remove('refreshing'); indicator.style.height = '0'; };
        if (id === 'view-dashboard')   loadDashboard().then(done);
        else if (id === 'view-browser') fetchAllFixtures().then(function() { buildDateStrip(); renderMatchesForDate(selectedDate); done(); });
        else if (id === 'view-history') loadHistory().then(done);
        else done();
      } else {
        indicator.classList.remove('pulling');
      }
    }, { passive: true });
  })();

  // ── AUTO REFRESH every 5 minutes ──
  setInterval(function() {
    var active = document.querySelector('.view.active');
    if (!active) return;
    var id = active.id;
    if (id === 'view-dashboard') loadDashboard();
    if (id === 'view-browser')   fetchAllFixtures().then(function() { buildDateStrip(); renderMatchesForDate(selectedDate); });
    if (id === 'view-history')   loadHistory();
  }, 5 * 60 * 1000);

  // ── INIT ──
  document.addEventListener('DOMContentLoaded', function() {
    loadDashboard();
    fetchAllFixtures();
  });
</script>

</body>
</html>
